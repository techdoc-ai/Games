<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍬 Candy Crush</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
/* ═══ ROOT ══════════════════════════════════════════ */
:root{
  --bg:#0f001e;--panel:rgba(255,255,255,.06);--border:rgba(255,255,255,.11);
  --accent:#ff6fd8;--gold:#ffd700;--shadow:0 12px 40px rgba(0,0,0,.65);
  --cell:52px;--gap:4px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;touch-action:none}
body{font-family:'Nunito',sans-serif;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 10% 10%,#7b1fa255 0%,transparent 55%),
             radial-gradient(ellipse at 90% 85%,#c2185b44 0%,transparent 55%),
             radial-gradient(ellipse at 50% 110%,#1565c033 0%,transparent 60%)}

/* ═══ PARTICLES ═════════════════════════════════════ */
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;opacity:.1;animation:floatUp linear infinite}
@keyframes floatUp{from{transform:translateY(110vh) rotate(0deg)}to{transform:translateY(-10vh) rotate(720deg)}}

/* ═══ LEVEL SELECT SCREEN ══════════════════════════ */
.screen-select{
  position:fixed;inset:0;background:var(--bg);z-index:300;
  display:flex;flex-direction:column;align-items:center;
  overflow-y:auto;padding:16px 12px 30px;
  transition:opacity .3s,transform .3s;
}
.screen-select.hidden{opacity:0;pointer-events:none;transform:scale(.95)}
.select-title{
  font-family:'Fredoka One',cursive;font-size:clamp(1.6rem,5vw,2.4rem);color:#fff;
  text-shadow:0 0 18px #ff6fd8,3px 3px 0 #7b1fa2;margin:10px 0 4px;letter-spacing:2px;
}
.select-sub{font-size:.7rem;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.home-btn{font-family:'Nunito',sans-serif;font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:6px 14px;border:1.5px solid rgba(255,111,216,.35);border-radius:20px;background:transparent;color:rgba(255,111,216,.6);text-decoration:none;transition:all .2s;display:inline-block;margin-bottom:10px}
.home-btn:hover,.home-btn:active{background:rgba(255,111,216,.12);color:#ff6fd8;border-color:#ff6fd8}
.level-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;width:100%;max-width:380px}
.level-card{
  background:var(--panel);border:1.5px solid var(--border);border-radius:18px;
  padding:14px 10px;text-align:center;cursor:pointer;
  transition:all .2s;position:relative;overflow:hidden;
}
.level-card:not(.locked):hover,.level-card:not(.locked):active{
  transform:scale(1.04);border-color:var(--accent);
  box-shadow:0 0 20px rgba(255,111,216,.3);
}
.level-card.locked{opacity:.35;cursor:not-allowed}
.lc-num{font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;line-height:1}
.lc-name{font-size:.65rem;font-weight:800;color:rgba(255,255,255,.55);margin-top:3px;text-transform:uppercase;letter-spacing:.8px}
.lc-stars{font-size:.95rem;margin-top:7px;letter-spacing:2px}
.lc-goal{font-size:.6rem;color:rgba(255,255,255,.35);margin-top:4px}
.lc-badge{
  position:absolute;top:6px;right:7px;
  font-family:'Fredoka One',cursive;font-size:.55rem;
  background:var(--accent);color:#fff;border-radius:20px;
  padding:1px 6px;letter-spacing:.5px;
}
.lc-new{background:#4caf50}

/* ═══ GAME SCREEN LAYOUT ═══════════════════════════ */
.wrapper{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:8px;padding:8px;width:100%}
.level-banner{
  font-family:'Fredoka One',cursive;font-size:.75rem;letter-spacing:2px;
  color:var(--accent);text-transform:uppercase;opacity:.8;
}
h1{font-family:'Fredoka One',cursive;font-size:clamp(1.3rem,5vw,2.4rem);color:#fff;
  text-shadow:0 0 18px #ff6fd8,0 0 50px #ff6fd855,3px 3px 0 #7b1fa2;letter-spacing:2px}

/* ═══ HUD ═══════════════════════════════════════════ */
.hud{display:flex;gap:6px;width:100%;justify-content:center}
.hud-box{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:5px 10px;text-align:center;backdrop-filter:blur(8px);flex:1;max-width:95px}
.hud-label{font-size:.5rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent)}
.hud-value{font-family:'Fredoka One',cursive;font-size:1.3rem;color:#fff;text-shadow:0 0 8px var(--accent);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hud-value.pop{animation:pop .3s ease}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.45)}}

/* ═══ GOAL PROGRESS BAR ════════════════════════════ */
.goal-bars{width:100%;max-width:500px;display:flex;flex-direction:column;gap:4px;padding:0 2px}
.goal-row{display:flex;align-items:center;gap:6px}
.goal-icon{font-size:.9rem;flex-shrink:0}
.goal-bar-bg{flex:1;background:rgba(255,255,255,.1);border-radius:20px;height:7px;overflow:hidden;border:1px solid rgba(255,255,255,.12)}
.goal-bar-fill{height:100%;border-radius:20px;background:linear-gradient(90deg,var(--accent),var(--gold));transition:width .4s cubic-bezier(.34,1.3,.64,1);box-shadow:0 0 6px rgba(255,111,216,.4)}
.goal-bar-fill.complete{background:linear-gradient(90deg,#4caf50,#8bc34a);box-shadow:0 0 8px rgba(76,175,80,.5)}
.goal-text{font-family:'Fredoka One',cursive;font-size:.7rem;color:rgba(255,255,255,.7);flex-shrink:0;min-width:38px;text-align:right}

/* ═══ CONTROLS ══════════════════════════════════════ */
.controls{display:flex;gap:7px;align-items:center}
.btn{font-family:'Fredoka One',cursive;font-size:.85rem;letter-spacing:1px;padding:7px 16px;border:none;border-radius:50px;cursor:pointer;transition:all .18s;-webkit-user-select:none;user-select:none}
.btn-primary{background:linear-gradient(135deg,#ff6fd8,#c2185b);color:#fff;box-shadow:0 5px 18px rgba(255,111,216,.45)}
.btn-primary:active{transform:scale(.95)}
.btn-hint{background:linear-gradient(135deg,#ffe033,#ff9500);color:#2a1200;box-shadow:0 5px 18px rgba(255,200,0,.35);display:flex;align-items:center;gap:4px}
.btn-hint:active{transform:scale(.95)}
.btn-hint:disabled{opacity:.38;cursor:not-allowed}
.btn-menu{background:rgba(255,255,255,.1);color:#fff;border:1px solid var(--border);padding:7px 12px}
.btn-menu:active{transform:scale(.95)}

/* ═══ GRID ══════════════════════════════════════════ */
.grid-wrap{background:var(--panel);border:1.5px solid var(--border);border-radius:20px;padding:8px;backdrop-filter:blur(16px);box-shadow:var(--shadow),inset 0 1px 0 rgba(255,255,255,.07);touch-action:none;overflow:hidden}
#grid{position:relative;user-select:none;touch-action:none;overflow:visible}

/* ═══ CELLS ═════════════════════════════════════════ */
.cell{position:absolute;width:var(--cell);height:var(--cell);display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:10px;touch-action:none;will-change:top}
@media(hover:hover){.cell:not(.jb-cell):not(.choco-cell):not(.ingr-cell):hover .candy{transform:scale(1.1);filter:brightness(1.15)}}
.cell.selected{z-index:10}
.cell.selected::after{content:'';position:absolute;inset:-4px;border-radius:13px;box-shadow:0 0 0 3px #fff,0 0 22px var(--accent),0 0 44px var(--accent);pointer-events:none;z-index:20}
.cell.hint-a{animation:hintPop .55s ease-in-out infinite alternate}
.cell.hint-b{animation:hintPop .55s ease-in-out infinite alternate .28s}
@keyframes hintPop{from{transform:scale(1);box-shadow:0 0 0 0 var(--gold)}to{transform:scale(1.12);box-shadow:0 0 0 3px var(--gold),0 0 20px var(--gold);border-radius:10px}}
.cell.matched .candy,.cell.matched .cb-body,.cell.matched .jb-body,.cell.matched .choco-cell,.cell.matched .ingr-body{animation:burst .36s ease forwards;pointer-events:none}
@keyframes burst{0%{transform:scale(1);opacity:1}40%{transform:scale(1.65);opacity:.75;filter:brightness(2.2)}100%{transform:scale(0);opacity:0}}
.cell.falling .candy,.cell.falling .cb-body,.cell.falling .jb-body,.cell.falling .choco-cell,.cell.falling .ingr-body{animation:fall .3s cubic-bezier(.34,1.36,.64,1) both}
@keyframes fall{from{transform:translateY(-68px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══ CANDY BASE ════════════════════════════════════ */
.candy{width:calc(var(--cell) - 10px);height:calc(var(--cell) - 10px);position:relative;flex-shrink:0;pointer-events:none;transition:transform .12s,filter .12s}
.candy::before{content:'';position:absolute;z-index:4;top:13%;left:17%;width:28%;height:16%;background:rgba(255,255,255,.52);border-radius:50%;pointer-events:none}
.candy::after{content:'';position:absolute;z-index:4;bottom:11%;right:14%;width:20%;height:11%;background:rgba(0,0,0,.18);border-radius:50%;pointer-events:none}
.candy .pat{position:absolute;inset:0;z-index:2;pointer-events:none}
.cv0{clip-path:circle(48% at 50% 50%);background:radial-gradient(circle at 36% 28%,#ff8a80 0%,#f44336 42%,#b71c1c 100%);filter:drop-shadow(0 4px 10px rgba(183,28,28,.75))}
.cv0 .pat{background:repeating-linear-gradient(-48deg,transparent 0,transparent 6px,rgba(255,255,255,.22) 6px,rgba(255,255,255,.22) 9px)}
.cv1{clip-path:polygon(50% 2%,96% 50%,50% 98%,4% 50%);background:radial-gradient(circle at 36% 28%,#90caf9 0%,#42a5f5 42%,#0d47a1 100%);filter:drop-shadow(0 4px 10px rgba(13,71,161,.75))}
.cv1 .pat{background:linear-gradient(135deg,rgba(255,255,255,.22) 0%,transparent 45%),linear-gradient(-45deg,rgba(255,255,255,.12) 0%,transparent 45%)}
.cv2{clip-path:polygon(25% 5%,75% 5%,97% 50%,75% 95%,25% 95%,3% 50%);background:radial-gradient(circle at 36% 28%,#b9f6ca 0%,#66bb6a 42%,#1b5e20 100%);filter:drop-shadow(0 4px 10px rgba(27,94,32,.75))}
.cv2 .pat{background:radial-gradient(circle at 32% 38%,rgba(255,255,255,.28) 0%,transparent 22%),radial-gradient(circle at 68% 68%,rgba(255,255,255,.16) 0%,transparent 18%)}
.cv3{clip-path:polygon(50% 2%,61% 35%,96% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,4% 35%,39% 35%);background:radial-gradient(circle at 36% 28%,#fffde7 0%,#ffee58 40%,#f57f17 100%);filter:drop-shadow(0 4px 10px rgba(245,127,23,.75))}
.cv3 .pat{background:radial-gradient(circle at 50% 48%,rgba(255,255,255,.3) 0%,transparent 38%)}
.cv4{clip-path:ellipse(47% 37% at 50% 50%);background:radial-gradient(ellipse at 36% 28%,#f3e5f5 0%,#ab47bc 42%,#4a148c 100%);filter:drop-shadow(0 4px 10px rgba(74,20,140,.75))}
.cv4 .pat{background:repeating-linear-gradient(90deg,transparent 0,transparent 8px,rgba(255,255,255,.16) 8px,rgba(255,255,255,.16) 11px)}
.cv5{clip-path:polygon(50% 2%,97% 37%,79% 95%,21% 95%,3% 37%);background:radial-gradient(circle at 36% 28%,#ffe0b2 0%,#ff7043 42%,#bf360c 100%);filter:drop-shadow(0 4px 10px rgba(191,54,12,.75))}
.cv5 .pat{background:linear-gradient(160deg,rgba(255,255,255,.2) 0%,transparent 55%)}
.cv6{clip-path:polygon(33% 0%,67% 0%,67% 33%,100% 33%,100% 67%,67% 67%,67% 100%,33% 100%,33% 67%,0% 67%,0% 33%,33% 33%);background:radial-gradient(circle at 36% 28%,#fce4ec 0%,#f06292 42%,#880e4f 100%);filter:drop-shadow(0 4px 10px rgba(136,14,79,.75))}
.cv6 .pat{background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.28) 0%,transparent 48%)}

/* ═══ SPECIAL OVERLAYS ══════════════════════════════ */
.sp-overlay{position:absolute;inset:3px;z-index:12;border-radius:7px;pointer-events:none;animation:spGlow 1.4s ease-in-out infinite}
@keyframes spGlow{0%,100%{opacity:.8}50%{opacity:1;filter:brightness(1.3)}}
.sp-h .sp-overlay{background:linear-gradient(0deg,transparent 26%,rgba(255,255,255,.72) 26%,rgba(255,255,255,.72) 37%,transparent 37%,transparent 63%,rgba(255,255,255,.72) 63%,rgba(255,255,255,.72) 74%,transparent 74%);box-shadow:0 0 0 1.5px rgba(255,215,0,.7),inset 0 0 6px rgba(255,215,0,.3)}
.sp-v .sp-overlay{background:linear-gradient(90deg,transparent 26%,rgba(255,255,255,.72) 26%,rgba(255,255,255,.72) 37%,transparent 37%,transparent 63%,rgba(255,255,255,.72) 63%,rgba(255,255,255,.72) 74%,transparent 74%);box-shadow:0 0 0 1.5px rgba(255,215,0,.7),inset 0 0 6px rgba(255,215,0,.3)}
.sp-bomb .sp-overlay{background:radial-gradient(circle at 50% 50%,rgba(255,120,0,.55) 0%,transparent 60%),conic-gradient(from 0deg,transparent 0deg,rgba(255,200,0,.4) 15deg,transparent 30deg,transparent 60deg,rgba(255,200,0,.4) 75deg,transparent 90deg,transparent 120deg,rgba(255,200,0,.4) 135deg,transparent 150deg,transparent 180deg,rgba(255,200,0,.4) 195deg,transparent 210deg,transparent 240deg,rgba(255,200,0,.4) 255deg,transparent 270deg,transparent 300deg,rgba(255,200,0,.4) 315deg,transparent 330deg);box-shadow:0 0 0 1.5px rgba(255,80,0,.8),inset 0 0 8px rgba(255,150,0,.4)}
.sp-fish .sp-overlay{background:radial-gradient(circle,rgba(0,230,255,.3) 0%,transparent 65%);display:flex;align-items:center;justify-content:center;font-size:calc(var(--cell) * .46);line-height:1;box-shadow:0 0 0 1.5px rgba(0,230,255,.85),inset 0 0 8px rgba(0,200,255,.4);animation:fishGlow 1.1s ease-in-out infinite}
@keyframes fishGlow{0%,100%{box-shadow:0 0 0 1.5px rgba(0,230,255,.85),inset 0 0 8px rgba(0,200,255,.4)}50%{box-shadow:0 0 0 2.5px #00e5ff,0 0 18px rgba(0,225,255,.65)}}

/* ═══ COLOR BOMB ════════════════════════════════════ */
.cb-body{width:calc(var(--cell) - 8px);height:calc(var(--cell) - 8px);position:relative;flex-shrink:0;border-radius:50%;pointer-events:none;overflow:hidden;background:radial-gradient(circle at 35% 28%,#6622cc 0%,#1a004a 55%,#070012 100%);filter:drop-shadow(0 0 6px #bb44ff) drop-shadow(0 0 16px #7700cc);animation:cbPulse 2s ease-in-out infinite}
.cb-body::before{content:'';position:absolute;inset:0;border-radius:50%;background:conic-gradient(rgba(255,51,102,.7) 0%,rgba(255,140,0,.7) 14%,rgba(255,230,0,.7) 28%,rgba(50,220,100,.7) 42%,rgba(50,150,255,.7) 57%,rgba(180,50,255,.7) 71%,rgba(255,51,180,.7) 85%,rgba(255,51,102,.7) 100%);animation:cbSpin 2s linear infinite;mix-blend-mode:screen}
.cb-body::after{content:'';position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 35% 30%,transparent 0%,rgba(5,0,15,.45) 60%,rgba(5,0,15,.75) 100%);pointer-events:none;z-index:2}
.cb-gloss{position:absolute;top:12%;left:16%;width:26%;height:14%;background:rgba(255,255,255,.55);border-radius:50%;z-index:3;pointer-events:none}
.cb-sparks{position:absolute;inset:0;border-radius:50%;z-index:4;pointer-events:none;animation:cbSpark 1.1s linear infinite}
.cb-sparks::before{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.9);width:4px;height:4px;top:22%;left:64%;animation:sparkle 1.1s ease-in-out infinite}
.cb-sparks::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.9);width:3px;height:3px;top:68%;left:28%;animation:sparkle 1.1s ease-in-out infinite .55s}
@keyframes cbSpin{to{transform:rotate(360deg)}}@keyframes cbPulse{0%,100%{filter:drop-shadow(0 0 6px #bb44ff) drop-shadow(0 0 16px #7700cc)}50%{filter:drop-shadow(0 0 10px #dd88ff) drop-shadow(0 0 28px #aa00ff)}}
@keyframes cbSpark{to{transform:rotate(360deg)}}@keyframes sparkle{0%,100%{opacity:0;transform:scale(0)}50%{opacity:1;transform:scale(1)}}
.cell.cb-activating .cb-body{animation:cbActivate .25s ease-in-out 3}
@keyframes cbActivate{0%,100%{transform:scale(1)}50%{transform:scale(1.25);filter:drop-shadow(0 0 18px #fff)}}

/* ═══ JAWBREAKER ════════════════════════════════════ */
.jb-body{width:calc(var(--cell) - 8px);height:calc(var(--cell) - 8px);position:relative;flex-shrink:0;border-radius:50%;pointer-events:none;overflow:hidden;background:radial-gradient(circle,#fff 0%,#f5f5f5 9%,#ff3333 9%,#e52020 19%,#ffee00 19%,#e6d400 29%,#33dd33 29%,#20c420 39%,#3388ff 39%,#1166ee 49%,#ee33ee 49%,#cc11cc 59%,#33dddd 59%,#11bbbb 69%,#cc5500 69%,#aa3300 82%,#882200 82%,#661100 100%);filter:drop-shadow(0 4px 12px rgba(0,0,0,.8))}
.jb-body::before{content:'';position:absolute;top:9%;left:15%;width:26%;height:14%;background:rgba(255,255,255,.65);border-radius:50%;z-index:6;pointer-events:none}
.jb-hp{position:absolute;bottom:2px;right:2px;z-index:30;background:rgba(0,0,0,.75);color:#fff;font-family:'Fredoka One',cursive;font-size:.6rem;width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:1px solid rgba(255,255,255,.4);pointer-events:none}
.jb-cracks{position:absolute;inset:4px;border-radius:50%;z-index:20;pointer-events:none}
.jb-2 .jb-cracks{background:linear-gradient(128deg,transparent 48%,rgba(0,0,0,.7) 48.5%,rgba(255,255,255,.3) 49%,rgba(0,0,0,.7) 49.5%,transparent 50%);border-radius:50%}
.jb-1 .jb-cracks{background:linear-gradient(128deg,transparent 46%,rgba(0,0,0,.75) 46.5%,rgba(255,255,255,.3) 47%,rgba(0,0,0,.75) 47.5%,transparent 48%),linear-gradient(54deg,transparent 44%,rgba(0,0,0,.65) 44.5%,rgba(255,255,255,.25) 45%,rgba(0,0,0,.65) 45.5%,transparent 46%),radial-gradient(circle at 50% 50%,rgba(0,0,0,.25) 0%,transparent 70%);border-radius:50%}
.jb-3 .jb-cracks{background:radial-gradient(circle at 50% 50%,transparent 55%,rgba(0,0,0,.3) 100%);border-radius:50%}
.jb-cell.jb-dying .jb-body{animation:jbDie .4s ease forwards}
@keyframes jbDie{0%{transform:scale(1)}20%{transform:scale(1.3) rotate(-8deg)}50%{transform:scale(1.5) rotate(12deg);filter:brightness(2.5) drop-shadow(0 0 12px #fff)}100%{transform:scale(0);opacity:0}}
.jb-cell.jb-hit .jb-body{animation:jbHit .25s ease}
@keyframes jbHit{0%,100%{transform:scale(1) rotate(0deg)}25%{transform:scale(1.15) rotate(-6deg)}75%{transform:scale(1.15) rotate(6deg)}}

/* ═══ OBSTACLE VISUALS ══════════════════════════════ */
/* Cherry badge on candy */
.cherry-badge{position:absolute;top:1px;right:1px;font-size:.55rem;z-index:15;pointer-events:none;line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.9))}
/* Lock overlay */
.lock-overlay{position:absolute;inset:0;border-radius:10px;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;font-size:calc(var(--cell)*.35);z-index:15;pointer-events:none;backdrop-filter:blur(1px)}
/* Chocolate tile */
.choco-cell{width:calc(var(--cell) - 8px);height:calc(var(--cell) - 8px);border-radius:10px;background:linear-gradient(135deg,#5d3a1a 0%,#3e2009 50%,#2a1500 100%);border:2px solid #7c4e2a;box-shadow:inset 0 2px 4px rgba(255,200,100,.15),0 2px 8px rgba(0,0,0,.6);position:relative;pointer-events:none;overflow:hidden;flex-shrink:0}
.choco-cell::before{content:'';position:absolute;top:8%;left:12%;width:30%;height:14%;background:rgba(255,220,140,.2);border-radius:50%}
.choco-cell::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent 48%,rgba(255,200,100,.12) 48%,rgba(255,200,100,.12) 52%,transparent 52%),linear-gradient(0deg,transparent 48%,rgba(255,200,100,.12) 48%,rgba(255,200,100,.12) 52%,transparent 52%);border-radius:8px}
.choco-cell.choco-new{animation:chocoSpread .35s cubic-bezier(.34,1.3,.64,1) forwards}
@keyframes chocoSpread{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
/* Ingredient tile */
.ingr-cell{cursor:default}
.ingr-body{width:calc(var(--cell) - 8px);height:calc(var(--cell) - 8px);font-size:calc(var(--cell)*.52);display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 3px 8px rgba(0,0,0,.7));pointer-events:none;line-height:1;flex-shrink:0}
/* Ingredient collected burst */
.ingr-body.collected{animation:ingrCollect .4s ease forwards}
@keyframes ingrCollect{0%{transform:scale(1)}40%{transform:scale(1.5);filter:brightness(2)}100%{transform:scale(0);opacity:0}}

/* ═══ FISH TOKEN ANIMATION ══════════════════════════ */
.fish-token{position:fixed;z-index:200;pointer-events:none;width:28px;height:28px;line-height:28px;text-align:center;font-size:1.3rem;filter:drop-shadow(0 0 6px #00e5ff);will-change:transform}

/* ═══ FEEDBACK ══════════════════════════════════════ */
.score-pop{position:fixed;pointer-events:none;z-index:80;font-family:'Fredoka One',cursive;font-size:1.35rem;color:var(--gold);text-shadow:0 0 10px #ffd700,1px 2px 0 rgba(0,0,0,.5);animation:sPop 1s ease forwards}
@keyframes sPop{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-80px) scale(1.35)}}
.combo-toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Fredoka One',cursive;font-size:2.2rem;color:var(--gold);text-shadow:0 0 28px #ffd700,0 2px 4px rgba(0,0,0,.6);z-index:90;pointer-events:none;opacity:0}
.combo-toast.show{animation:comboAnim .85s ease forwards}
@keyframes comboAnim{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}30%{opacity:1;transform:translate(-50%,-60%) scale(1.25)}70%{opacity:1;transform:translate(-50%,-65%) scale(1.06)}100%{opacity:0;transform:translate(-50%,-85%) scale(.9)}}
.swipe-arrow{position:fixed;pointer-events:none;z-index:85;font-size:2rem;opacity:0;transition:opacity .12s;text-shadow:0 0 12px #fff}
.swipe-arrow.show{opacity:1}

/* ═══ MODALS ════════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(8,0,18,.9);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:all}
#introOverlay{z-index:400;}
.modal{background:linear-gradient(155deg,#2e0b5c,#0f001e);border:1.5px solid var(--border);border-radius:28px;padding:28px 36px;text-align:center;box-shadow:var(--shadow);transform:scale(.85);transition:transform .35s cubic-bezier(.34,1.56,.64,1);max-width:88vw}
.overlay.show .modal{transform:scale(1)}
.modal h2{font-family:'Fredoka One',cursive;font-size:2rem;color:#fff;margin-bottom:6px;text-shadow:0 0 18px var(--accent)}
.modal p{color:rgba(255,255,255,.6);margin-bottom:12px;font-size:.9rem}
.modal .stars-display{font-size:2.2rem;margin:10px 0;letter-spacing:6px}
.modal .final-score{font-family:'Fredoka One',cursive;font-size:2.8rem;color:var(--gold);text-shadow:0 0 20px rgba(255,215,0,.5);margin-bottom:16px}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
/* Level intro */
.intro-level-tag{font-family:'Fredoka One',cursive;font-size:.75rem;color:var(--accent);letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
.intro-name{font-family:'Fredoka One',cursive;font-size:1.8rem;color:#fff;margin-bottom:12px;text-shadow:0 0 14px var(--accent)}
.intro-goals-box{background:rgba(255,255,255,.07);border-radius:14px;padding:10px 14px;margin:8px 0 16px}
.intro-goal-item{display:flex;align-items:center;gap:8px;font-size:.88rem;color:rgba(255,255,255,.85);font-weight:700;padding:3px 0}
.intro-obstacles{font-size:.68rem;color:rgba(255,255,255,.35);margin-top:6px}

/* ════════════════════════════════════════════════════
   CELL SIZE & GRID POSITIONING
════════════════════════════════════════════════════ */
function csz(){return parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||52;}
function pos(r,c){const s=csz();return{left:c*(s+GAP),top:r*(s+GAP)};}

function calcCellSize(){
  const pad=8*2+4,gapT=GAP*7;
  const hudH=document.querySelector('.hud')?.offsetHeight||55;
  const ctrlH=document.querySelector('.controls')?.offsetHeight||40;
  const bannerH=document.querySelector('.level-banner')?.offsetHeight||20;
  const goalH=document.querySelector('.goal-bars')?.offsetHeight||30;
  const totalV=hudH+ctrlH+bannerH+goalH+55+pad*2+gapT;
  const maxH=Math.floor((window.innerWidth-pad*2-16-gapT)/8);
  const maxV=Math.floor((window.innerHeight-totalV)/8);
  const cell=Math.max(26,Math.min(52,maxH,maxV));
  document.documentElement.style.setProperty('--cell',cell+'px');
  const dim=cell*8+GAP*7;
  const g=document.getElementById('grid');
  if(g){g.style.width=g.style.height=dim+'px';}
  if(board.length) repositionAll();
}
function repositionAll(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    const el=cellEl(r,c);if(!el)continue;
    const p=pos(r,c);el.style.transition='none';el.style.left=p.left+'px';el.style.top=p.top+'px';
  }
}
window.addEventListener('resize',calcCellSize);

/* ════════════════════════════════════════════════════

════════════════════════════════════════════════════ */
function makeParticles(){
  const p=document.getElementById('particles');p.innerHTML='';
  for(let i=0;i<20;i++){
    const d=document.createElement('div'),sz=14+Math.random()*44;
    d.className='particle';
    d.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;background:${COLORS[0|Math.random()*N]};border-radius:${Math.random()>.5?'50%':'20%'};animation-duration:${9+Math.random()*14}s;animation-delay:${-Math.random()*16}s;`;
    p.appendChild(d);
  }
}

/* ════════════════════════════════════════════════════

════════════════════════════════════════════════════ */
function getLevelStars(n){return+(localStorage.getItem(`lvl_${n}_stars`)||0);}
function saveLevelStars(n,s){if(s>getLevelStars(n))localStorage.setItem(`lvl_${n}_stars`,s);}
function isUnlocked(n){return n===1||getLevelStars(n-1)>0;}

function showLevelSelect(){
  closeAllOverlays();
  gameActive=false;
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('introOverlay').classList.remove('show');
  const sel=document.getElementById('screenSelect');
  sel.classList.remove('hidden');
  buildLevelGrid();
}

const WORLD_NAMES=['Learn the Ropes','Mix It Up','Rising Stakes','Harder Grind','Expert Zone'];
function buildLevelGrid(){
  const grid=document.getElementById('levelGrid');
  grid.innerHTML='';
  LEVELS.forEach((lv,idx)=>{
    // World header every 5 levels
    if(idx%5===0){
      const world=Math.floor(idx/5)+1;
      const hdr=document.createElement('div');
      hdr.style.cssText='grid-column:1/-1;font-family:"Fredoka One",cursive;font-size:.7rem;color:rgba(255,111,216,.8);letter-spacing:2px;text-transform:uppercase;padding:8px 4px 2px;border-top:1px solid rgba(255,255,255,.08);margin-top:4px;';
      hdr.textContent=`World ${world} · ${WORLD_NAMES[world-1]}`;
      grid.appendChild(hdr);
    }
    const stars=getLevelStars(lv.id);
    const unlocked=isUnlocked(lv.id);
    const card=document.createElement('div');
    card.className='level-card'+(unlocked?'':' locked');
    const starStr=unlocked?(stars>0?'★'.repeat(stars)+'☆'.repeat(3-stars):'☆☆☆'):'🔒';
    const goalStr=lv.goals.map(g=>g.icon+' '+g.label).join(' · ');
    card.innerHTML=`
      <div class="lc-num">${lv.id}</div>
      <div class="lc-name">${lv.name}</div>
      <div class="lc-stars">${starStr}</div>
      <div class="lc-goal">${goalStr}</div>
      ${stars===0&&unlocked?'<div class="lc-badge lc-new">NEW</div>':''}
    `;
    if(unlocked) card.addEventListener('click',()=>openLevelIntro(lv.id));
    grid.appendChild(card);
  });
}

function openLevelIntro(id){
  currentLevel=id;
  document.getElementById('screenSelect').classList.add('hidden');
  const lv=LEVELS[id-1];
  document.getElementById('introTag').textContent=`LEVEL ${lv.id}`;
  document.getElementById('introName').textContent=lv.name;
  // Goals
  const gbox=document.getElementById('introGoals');
  gbox.innerHTML=lv.goals.map(g=>`<div class="intro-goal-item"><span>${g.icon}</span><span>${g.label}: ${g.target}</span></div>`).join('');
  // Obstacles hint
  const obs=[];
  if(lv.obs.cherries)obs.push(`🍒 ${lv.obs.cherries} hidden cherries`);
  if(lv.obs.locks)obs.push(`🔒 ${lv.obs.locks} locked candies`);
  if(lv.obs.chocolate)obs.push(`🍫 ${lv.obs.chocolate} chocolate tiles`+(lv.spreadEvery?` (spreads every ${lv.spreadEvery} moves)`:'')); 
  if(lv.obs.ingredients)obs.push(`🍓 ${lv.obs.ingredients} ingredients to drop`);
  if(lv.obs.jawbreakers)obs.push(`⬤ ${lv.obs.jawbreakers} jawbreakers`);
  document.getElementById('introObs').textContent=obs.length?'Watch out for: '+obs.join(', '):'Clean board — enjoy!';
  document.getElementById('introOverlay').classList.add('show');
}

function startLevel(){
  document.getElementById('introOverlay').classList.remove('show');
  document.getElementById('screenSelect').classList.add('hidden');
  document.getElementById('gameScreen').style.display='flex';
  loadLevel(currentLevel);
}

/* ════════════════════════════════════════════════════
   LEVEL LOADING
════════════════════════════════════════════════════ */
function loadLevel(id){
  const lv=LEVELS[id-1];
  levelLoaded=lv;
  score=0;moves=lv.moves;moveCount=0;
  goalProgress={cherries:0,locks:0,ingredients:0,chocolate:0};
  chocoCleared=0;
  selected=null;busy=false;hintEls=[];
  calcCellSize();

  // Update banner
  document.getElementById('levelBanner').textContent=`LEVEL ${lv.id} · ${lv.name.toUpperCase()}`;
  document.getElementById('hintBtn').disabled=false;

  // Build clean board
  board=[];
  for(let r=0;r<ROWS;r++){
    board[r]=[];
    for(let c=0;c<COLS;c++){
      let cell;do{cell=rc();}while(causesMatch(board,r,c,cell.v));
      board[r][c]=cell;
    }
  }

  // Place obstacles
  placeObstacles(lv);

  chocoInitialCount=countChocolate();
  renderAll();
  updateHUD();
  buildGoalBars();
  gameActive=true;
  makeParticles();
}

function placeObstacles(lv){
  const obs=lv.obs;
  const allPositions=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)allPositions.push({r,c});
  shuffle(allPositions);
  let idx=0;

  // Jawbreakers — placed first in corners/edges
  for(let i=0;i<(obs.jawbreakers||0);i++){
    const{r,c}=allPositions[idx++];
    board[r][c]={v:V_JB,sp:null,jb:3};
  }

  // Chocolate tiles
  const chocoPositions=[];
  for(let i=0;i<(obs.chocolate||0);i++){
    const{r,c}=allPositions[idx++];
    board[r][c]={v:V_CHOCO,chocolate:true};
    chocoPositions.push({r,c});
  }

  // Ingredients — place in top 3 rows so they have room to fall
  const ingrPool=allPositions.filter(p=>p.r<=2&&board[p.r][p.c].v>=0);
  shuffle(ingrPool);
  for(let i=0;i<(obs.ingredients||0);i++){
    if(!ingrPool[i])break;
    const{r,c}=ingrPool[i];
    board[r][c]={v:V_INGR,ingredient:INGR_TYPES[i%INGR_TYPES.length]};
  }

  // Locks — only on normal candy cells
  const lockPool=allPositions.filter(p=>board[p.r][p.c].v>=0&&!board[p.r][p.c].locked);
  shuffle(lockPool);
  for(let i=0;i<(obs.locks||0)&&i<lockPool.length;i++){
    board[lockPool[i].r][lockPool[i].c].locked=true;
  }

  // Cherries — only on normal candy cells
  const cherryPool=allPositions.filter(p=>board[p.r][p.c].v>=0&&!board[p.r][p.c].locked);
  shuffle(cherryPool);
  for(let i=0;i<(obs.cherries||0)&&i<cherryPool.length;i++){
    board[cherryPool[i].r][cherryPool[i].c].cherry=true;
  }
}

function renderAll(){

function makeCell(r,c){
  const cell=board[r][c];
  const el=document.createElement('div');
  el.dataset.r=r;el.dataset.c=c;

  // JAWBREAKER
  if(cell.jb!=null){
    el.className=`cell jb-cell jb-${cell.jb}`;
    const body=document.createElement('div');body.className='jb-body';
    const cracks=document.createElement('div');cracks.className='jb-cracks';
    const hp=document.createElement('div');hp.className='jb-hp';hp.textContent=cell.jb;
    el.appendChild(body);el.appendChild(cracks);el.appendChild(hp);
    return el;
  }
  // CHOCOLATE
  if(cell.v===V_CHOCO){
    el.className='cell choco-cell-wrap';
    const body=document.createElement('div');body.className='choco-cell';
    el.appendChild(body);return el;
  }
  // INGREDIENT
  if(cell.v===V_INGR){
    el.className='cell ingr-cell';
    const body=document.createElement('div');body.className='ingr-body';body.textContent=cell.ingredient||'🍓';
    el.appendChild(body);return el;
  }
  // COLOR BOMB
  if(cell.sp==='colorbomb'){
    el.className='cell';
    const body=document.createElement('div');body.className='cb-body';
    const gloss=document.createElement('div');gloss.className='cb-gloss';
    const sparks=document.createElement('div');sparks.className='cb-sparks';
    body.appendChild(gloss);body.appendChild(sparks);el.appendChild(body);return el;
  }
  // FISH
  if(cell.sp==='fish'){
    el.className=`cell sp-fish`;
    const candy=document.createElement('div');candy.className=`candy cv${cell.v}`;
    const pat=document.createElement('div');pat.className='pat';candy.appendChild(pat);
    el.appendChild(candy);
    const ov=document.createElement('div');ov.className='sp-overlay';ov.textContent='🐟';el.appendChild(ov);
    return el;
  }
  // REGULAR + stripe/bomb
  el.className='cell'+(cell.sp?` sp-${cell.sp}`:'');
  const candy=document.createElement('div');candy.className=`candy cv${cell.v}`;
  const pat=document.createElement('div');pat.className='pat';
  candy.appendChild(pat);el.appendChild(candy);
  if(cell.sp){const ov=document.createElement('div');ov.className='sp-overlay';el.appendChild(ov);}
  // Cherry badge
  if(cell.cherry){const cb=document.createElement('div');cb.className='cherry-badge';cb.textContent='🍒';el.appendChild(cb);}
  // Lock overlay
  if(cell.locked){const lo=document.createElement('div');lo.className='lock-overlay';lo.textContent='🔒';el.appendChild(lo);}
  return el;
}

function placeCell(el,r,c,animate){
  const p=pos(r,c);
  el.style.transition=animate?`top 290ms cubic-bezier(0.4,0,0.2,1)`:'none';
  el.style.left=p.left+'px';el.style.top=p.top+'px';
}
function cellEl(r,c){return document.querySelector(`#grid .cell[data-r="${r}"][data-c="${c}"]`);}
function repCell(r,c){
  const grid=document.getElementById('grid'),old=cellEl(r,c);
  const el=makeCell(r,c);placeCell(el,r,c,false);
  if(old)grid.replaceChild(el,old);else grid.appendChild(el);
}

/* ════════════════════════════════════════════════════
   HUD & GOAL BARS
════════════════════════════════════════════════════ */
function updateHUD(){
  document.getElementById('scoreDisplay').textContent=score;
  document.getElementById('movesDisplay').textContent=moves;
  // Primary goal display
  if(levelLoaded){
    const g=levelLoaded.goals[0];
    const cur=getGoalCurrent(g);
    document.getElementById('goalDisplay').textContent=`${g.icon} ${Math.min(cur,g.target)}/${g.target}`;
  }
  updateGoalBars();
}

function getGoalCurrent(g){
  if(g.type==='score')return score;
  if(g.type==='cherries')return goalProgress.cherries;
  if(g.type==='locks')return goalProgress.locks;
  if(g.type==='ingredients')return goalProgress.ingredients;
  if(g.type==='chocolate'){
    // How many cleared (started with X, now Y remain)
    return Math.max(0,chocoInitialCount-countChocolate());
  }
  return 0;
}

function buildGoalBars(){
  const container=document.getElementById('goalBars');
  container.innerHTML='';
  if(!levelLoaded)return;
  levelLoaded.goals.forEach((g,i)=>{
    const row=document.createElement('div');row.className='goal-row';
    row.innerHTML=`<span class="goal-icon">${g.icon}</span>
      <div class="goal-bar-bg"><div class="goal-bar-fill" id="gbar_${i}" style="width:0%"></div></div>
      <span class="goal-text" id="gtxt_${i}">0/${g.target}</span>`;
    container.appendChild(row);
  });
}

function updateGoalBars(){
  if(!levelLoaded)return;
  levelLoaded.goals.forEach((g,i)=>{
    const cur=Math.min(getGoalCurrent(g),g.target);
    const pct=Math.round(cur/g.target*100);
    const bar=document.getElementById(`gbar_${i}`);
    const txt=document.getElementById(`gtxt_${i}`);
    if(bar){bar.style.width=pct+'%';if(pct>=100)bar.classList.add('complete');}
    if(txt)txt.textContent=`${cur}/${g.target}`;
  });
}

/* ════════════════════════════════════════════════════
   WIN / FAIL
════════════════════════════════════════════════════ */
function checkGoalComplete(){
  if(!levelLoaded||!gameActive)return;
  const allDone=levelLoaded.goals.every(g=>getGoalCurrent(g)>=g.target);
  if(allDone) setTimeout(onWin,400);
}

function calcStars(){
  const pct=moves/levelLoaded.moves;
  if(pct>=0.5)return 3;
  if(pct>=0.2)return 2;
  return 1;
}

function onWin(){
  gameActive=false;
  const stars=calcStars();
  saveLevelStars(currentLevel,stars);
  document.getElementById('winStars').textContent='★'.repeat(stars)+'☆'.repeat(3-stars);
  document.getElementById('winScore').textContent=score.toLocaleString();
  document.getElementById('winMsg').textContent=stars===3?'Incredible! 3 stars!':stars===2?'Great job! 2 stars!':'Level complete! 1 star';
  document.getElementById('nextLvlBtn').style.display=currentLevel<LEVELS.length?'':'none';
  document.getElementById('winOverlay').classList.add('show');
}

function onFail(){
  if(!gameActive)return;
  gameActive=false;
  document.getElementById('failScore').textContent=score.toLocaleString();
  const pct=levelLoaded.goals.map(g=>`${g.icon} ${Math.min(getGoalCurrent(g),g.target)}/${g.target}`).join(' · ');
  document.getElementById('failMsg').textContent=`Progress: ${pct}`;
  document.getElementById('failOverlay').classList.add('show');
}

function closeAllOverlays(){
  ['introOverlay','winOverlay','failOverlay'].forEach(id=>document.getElementById(id).classList.remove('show'));
}

/* ════════════════════════════════════════════════════
   INPUT
════════════════════════════════════════════════════ */
let touchStart=null;
const SWIPE_THR=14;

function getCellAt(x,y){
  const el=document.elementFromPoint(x,y);if(!el)return null;
  const cell=el.closest('.cell');if(!cell||!cell.dataset.r)return null;
  return{r:+cell.dataset.r,c:+cell.dataset.c};
}
function onPointerDown(e){
  if(busy||!gameActive)return;
  const t=e.touches?e.touches[0]:e;
  const p=getCellAt(t.clientX,t.clientY);if(!p)return;
  touchStart={r:p.r,c:p.c,x:t.clientX,y:t.clientY};
}
function onPointerMove(e){
  if(!touchStart||busy)return;e.preventDefault();
  const t=e.touches?e.touches[0]:e;
  const dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y;
  if(Math.hypot(dx,dy)<SWIPE_THR)return;
  const arrows=['→','←','↓','↑'];
  const arrow=document.getElementById('swipeArrow');
  arrow.textContent=arrows[getDir(dx,dy)];
  arrow.style.left=t.clientX+'px';arrow.style.top=(t.clientY-44)+'px';
  arrow.classList.add('show');
}
function onPointerUp(e){
  document.getElementById('swipeArrow').classList.remove('show');
  if(!touchStart||busy){touchStart=null;return;}
  const t=e.changedTouches?e.changedTouches[0]:e;
  const dx=t.clientX-touchStart.x,dy=t.clientY-touchStart.y;
  if(Math.hypot(dx,dy)<SWIPE_THR){handleSelect(touchStart.r,touchStart.c);}
  else{
    const[[dr,dc]]=[[[0,1],[0,-1],[1,0],[-1,0]][getDir(dx,dy)]];
    const r2=touchStart.r+dr,c2=touchStart.c+dc;
    if(selected){cellEl(selected.r,selected.c)?.classList.remove('selected');selected=null;}
    if(r2>=0&&r2<ROWS&&c2>=0&&c2<COLS)doSwap(touchStart.r,touchStart.c,r2,c2);
  }
  touchStart=null;
}
function getDir(dx,dy){if(Math.abs(dx)>=Math.abs(dy))return dx>0?0:1;return dy>0?2:3;}
function handleSelect(r,c){
  clearHintHL();
  const cell=board[r][c];
  if(!cell||cell.jb!=null||cell.v===V_CHOCO||cell.v===V_INGR)return;
  if(selected===null){
    selected={r,c};cellEl(r,c)?.classList.add('selected');
  }else{
    const{r:pr,c:pc}=selected;
    cellEl(pr,pc)?.classList.remove('selected');selected=null;
    if(Math.abs(r-pr)+Math.abs(c-pc)===1)doSwap(pr,pc,r,c);
    else{selected={r,c};cellEl(r,c)?.classList.add('selected');}
  }
}
function attachGridEvents(){
  const gw=document.getElementById('gridWrap');
  gw.addEventListener('touchstart',onPointerDown,{passive:true});
  gw.addEventListener('touchmove',onPointerMove,{passive:false});
  gw.addEventListener('touchend',onPointerUp,{passive:true});
  gw.addEventListener('mousedown',onPointerDown);
  gw.addEventListener('mousemove',onPointerMove);
  gw.addEventListener('mouseup',onPointerUp);
}

/* ════════════════════════════════════════════════════
   BOARD HELPERS
════════════════════════════════════════════════════ */
function rc(){return{v:0|Math.random()*N,sp:null};}
function causesMatch(b,r,c,v){
  if(c>=2&&b[r][c-1]?.v===v&&b[r][c-2]?.v===v)return true;
  if(r>=2&&b[r-1]?.[c]?.v===v&&b[r-2]?.[c]?.v===v)return true;
  return false;
}
function isMatchable(cell){
  return cell&&cell.v>=0&&cell.jb==null&&!cell.locked&&cell.v!==V_CHOCO&&cell.v!==V_INGR;
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=0|Math.random()*(i+1);[a[i],a[j]]=[a[j],a[i]];}}
function swapB(r1,c1,r2,c2){[board[r1][c1],board[r2][c2]]=[board[r2][c2],board[r1][c1]];}
function countChocolate(){let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]?.v===V_CHOCO)n++;return n;}

/* ════════════════════════════════════════════════════
   SWAP
════════════════════════════════════════════════════ */
async function doSwap(r1,c1,r2,c2){
  if(busy||!gameActive)return;
  const ca=board[r1][c1],cb=board[r2][c2];
  if(!ca||!cb)return;
  if(ca.jb!=null||cb.jb!=null||ca.v===V_CHOCO||cb.v===V_CHOCO||ca.v===V_INGR||cb.v===V_INGR)return;

  const aCB=ca.sp==='colorbomb',bCB=cb.sp==='colorbomb';
  if(aCB||bCB){
    busy=true;moves--;moveCount++;
    if(aCB&&bCB){await activateDoubleColorBomb(r1,c1,r2,c2);}
    else{
      const cbPos=aCB?{r:r1,c:c1}:{r:r2,c:c2};
      const tv=(aCB?cb:ca).v;if(tv<0){busy=false;moves++;return;}
      await activateColorBomb(cbPos.r,cbPos.c,tv);
    }
    spreadChocolate();
    await cascadeLoop();updateHUD();checkGoalComplete();
    if(moves<=0&&gameActive)onFail();
    busy=false;return;
  }

  busy=true;
  swapB(r1,c1,r2,c2);
  const matched=findMatches();
  const squares=find2x2Squares(matched);
  if(!matched.length&&!squares.length){
    swapB(r1,c1,r2,c2);shakeCell(r1,c1);shakeCell(r2,c2);busy=false;return;
  }
  moves--;moveCount++;repCell(r1,c1);repCell(r2,c2);
  spreadChocolate();
  await delay(80);await cascadeLoop();
  updateHUD();checkGoalComplete();
  if(moves<=0&&gameActive)onFail();
  busy=false;
}

function shakeCell(r,c){
  const el=cellEl(r,c);if(!el)return;
  el.style.transition='transform .08s';el.style.transform='scale(.84)';
  setTimeout(()=>{el.style.transform='';el.style.transition=''},180);
}

/* ════════════════════════════════════════════════════
   MATCH DETECTION
════════════════════════════════════════════════════ */
function findMatches(b=board){
  const m=new Set();
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS-2;c++){
      const v=b[r][c]?.v;if(!isMatchable(b[r][c]))continue;
      if(b[r][c+1]?.v===v&&isMatchable(b[r][c+1])&&b[r][c+2]?.v===v&&isMatchable(b[r][c+2])){
        let k=c;while(k<COLS&&b[r][k]?.v===v&&isMatchable(b[r][k])){m.add(`${r},${k}`);k++;}
      }
    }
  }
  for(let c=0;c<COLS;c++){
    for(let r=0;r<ROWS-2;r++){
      const v=b[r]?.[c]?.v;if(!isMatchable(b[r]?.[c]))continue;
      if(b[r+1]?.[c]?.v===v&&isMatchable(b[r+1]?.[c])&&b[r+2]?.[c]?.v===v&&isMatchable(b[r+2]?.[c])){
        let k=r;while(k<ROWS&&b[k]?.[c]?.v===v&&isMatchable(b[k]?.[c])){m.add(`${k},${c}`);k++;}
      }
    }
  }
  return[...m].map(s=>{const[r,c]=s.split(',');return{r:+r,c:+c};});
}

/* ════════════════════════════════════════════════════
   2×2 FISH DETECTION
════════════════════════════════════════════════════ */
function find2x2Squares(alreadyMatched=[]){
  const matchedSet=new Set(alreadyMatched.map(({r,c})=>`${r},${c}`));
  const found=[],seen=new Set();
  for(let r=0;r<ROWS-1;r++){
    for(let c=0;c<COLS-1;c++){
      const cells=[`${r},${c}`,`${r},${c+1}`,`${r+1},${c}`,`${r+1},${c+1}`];
      if(cells.some(k=>seen.has(k)||matchedSet.has(k)))continue;
      const v=board[r][c]?.v;
      if(v==null||v<0||!isMatchable(board[r][c]))continue;
      const ok=[[r,c+1],[r+1,c],[r+1,c+1]].every(([rr,cc])=>board[rr][cc]?.v===v&&isMatchable(board[rr][cc]));
      if(ok){found.push({r,c,v});cells.forEach(k=>seen.add(k));}
    }
  }
  return found;
}

/* ════════════════════════════════════════════════════
   SPECIAL DETECTION
════════════════════════════════════════════════════ */
function detectSpecials(matchedArr){
  const mset=new Set(matchedArr.map(({r,c})=>`${r},${c}`));
  const creates=[],taken=new Set();
  const hRuns=[],vRuns=[];
  for(let r=0;r<ROWS;r++){
    let run=[],lastV=-99;
    for(let c=0;c<=COLS;c++){
      const key=`${r},${c}`,v=(c<COLS&&mset.has(key))?board[r][c]?.v:-99;
      if(v===lastV&&v>=0){run.push({r,c});}
      else{if(run.length>=3)hRuns.push({cells:[...run],v:lastV,dir:'h'});run=v>=0?[{r,c}]:[];lastV=v;}
    }
  }
  for(let c=0;c<COLS;c++){
    let run=[],lastV=-99;
    for(let r=0;r<=ROWS;r++){
      const key=`${r},${c}`,v=(r<ROWS&&mset.has(key))?board[r]?.[c]?.v:-99;
      if(v===lastV&&v>=0){run.push({r,c});}
      else{if(run.length>=3)vRuns.push({cells:[...run],v:lastV,dir:'v'});run=v>=0?[{r,c}]:[];lastV=v;}
    }
  }
  for(const hr of hRuns)for(const vr of vRuns){
    if(hr.v!==vr.v)continue;
    const hk=new Set(hr.cells.map(({r,c})=>`${r},${c}`));
    const inter=vr.cells.find(({r,c})=>hk.has(`${r},${c}`));
    if(!inter)continue;
    const k=`${inter.r},${inter.c}`;
    if(!taken.has(k)){creates.push({r:inter.r,c:inter.c,v:hr.v,sp:'bomb'});taken.add(k);}
  }
  for(const run of[...hRuns,...vRuns]){
    if(run.cells.length>=5){
      const mid=run.cells[0|run.cells.length/2];const k=`${mid.r},${mid.c}`;
      if(!taken.has(k)){creates.push({r:mid.r,c:mid.c,v:V_CB,sp:'colorbomb'});taken.add(k);}
    }else if(run.cells.length===4){
      const mid=run.cells[0|run.cells.length/2];const k=`${mid.r},${mid.c}`;
      if(!taken.has(k)){creates.push({r:mid.r,c:mid.c,v:board[mid.r][mid.c].v,sp:run.dir});taken.add(k);}
    }
  }
  return creates;
}

/* ════════════════════════════════════════════════════
   SPECIAL EXPANSION
════════════════════════════════════════════════════ */
function expandSpecials(matchedArr){
  const mset=new Set(matchedArr.map(({r,c})=>`${r},${c}`));
  const queue=[...matchedArr],done=new Set();
  while(queue.length){
    const{r,c}=queue.pop();const key=`${r},${c}`;
    if(done.has(key))continue;done.add(key);
    const cell=board[r]?.[c];
    if(!cell||cell.v<0||!cell.sp||cell.sp==='colorbomb')continue;
    const add=(nr,nc)=>{
      const k=`${nr},${nc}`;
      if(!mset.has(k)&&board[nr]?.[nc]?.jb==null&&board[nr]?.[nc]?.v!==V_CHOCO){mset.add(k);queue.push({r:nr,c:nc});}
    };
    if(cell.sp==='h')for(let cc=0;cc<COLS;cc++)add(r,cc);
    else if(cell.sp==='v')for(let rr=0;rr<ROWS;rr++)add(rr,c);
    else if(cell.sp==='bomb')for(let dr=-2;dr<=2;dr++)for(let dc=-2;dc<=2;dc++){const nr=r+dr,nc=c+dc;if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS)add(nr,nc);}
    else if(cell.sp==='fish'){
      const fishTargets=[];
      for(let rr=0;rr<ROWS;rr++)for(let cc=0;cc<COLS;cc++){
        const k2=`${rr},${cc}`;
        if(k2===key||mset.has(k2))continue;
        if(board[rr][cc]?.v===cell.v&&isMatchable(board[rr][cc]))fishTargets.push({r:rr,c:cc});
      }
      shuffle(fishTargets);fishTargets.slice(0,5).forEach(({r:nr,c:nc})=>add(nr,nc));
    }
  }
  return[...mset].map(s=>{const[r,c]=s.split(',');return{r:+r,c:+c};});
}

/* ════════════════════════════════════════════════════
   COLOR BOMB
════════════════════════════════════════════════════ */
async function activateColorBomb(cbR,cbC,targetV){
  cellEl(cbR,cbC)?.classList.add('cb-activating');await delay(350);
  const toDestroy=[{r:cbR,c:cbC}];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(r===cbR&&c===cbC)continue;
    const cell=board[r][c];
    if(cell&&cell.v===targetV&&cell.jb==null&&cell.v!==V_CHOCO)toDestroy.push({r,c});
  }
  toDestroy.sort((a,b)=>Math.hypot(a.r-cbR,a.c-cbC)-Math.hypot(b.r-cbR,b.c-cbC));
  for(const{r,c}of toDestroy){cellEl(r,c)?.classList.add('matched');await delay(28);}
  const pts=toDestroy.length*50;score+=pts;
  collectCherries(toDestroy);damageChocolate(toDestroy);damageLocks(toDestroy);
  toast(`🌈 Color Bomb! +${pts}`);scorePop(pts);
  await delay(420);
  toDestroy.forEach(({r,c})=>{cellEl(r,c)?.remove();board[r][c]={v:-1,sp:null};});
  await gravity();await delay(300);
}
async function activateDoubleColorBomb(r1,c1,r2,c2){
  toast('🌈✨ MEGA RAINBOW! ALL CLEAR!');
  const mx=(r1+r2)/2,my=(c1+c2)/2;
  const toDestroy=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]?.jb!=null||board[r][c]?.v===V_CHOCO)continue;
    toDestroy.push({r,c});
  }
  toDestroy.sort((a,b)=>Math.hypot(a.r-mx,a.c-my)-Math.hypot(b.r-mx,b.c-my));
  for(const{r,c}of toDestroy){cellEl(r,c)?.classList.add('matched');await delay(18);}
  const pts=toDestroy.length*80;score+=pts;scorePop(pts);
  collectCherries(toDestroy);
  await delay(500);
  toDestroy.forEach(({r,c})=>{cellEl(r,c)?.remove();board[r][c]={v:-1,sp:null};});
  await gravity();await delay(300);
}

/* ════════════════════════════════════════════════════
   OBSTACLE HANDLERS
════════════════════════════════════════════════════ */
function collectCherries(cells){
  cells.forEach(({r,c})=>{
    if(board[r][c]?.cherry){
      board[r][c].cherry=false;
      goalProgress.cherries++;
      score+=50;
    }
  });
}

function damageLocks(expanded){
  const mset=new Set(expanded.map(({r,c})=>`${r},${c}`));
  const dmgd=new Set();
  for(const{r,c}of expanded){
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const cell=board[nr][nc];if(!cell?.locked)continue;
      const k=`${nr},${nc}`;if(dmgd.has(k))continue;dmgd.add(k);
      cell.locked=false;goalProgress.locks++;score+=75;
      repCell(nr,nc);scorePop(75);
    }
  }
}

function damageChocolate(expanded){
  const mset=new Set(expanded.map(({r,c})=>`${r},${c}`));
  const dmgd=new Set();
  for(const{r,c}of expanded){
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const cell=board[nr][nc];
      if(cell?.v!==V_CHOCO)continue;
      const k=`${nr},${nc}`;if(dmgd.has(k)||mset.has(k))continue;
      dmgd.add(k);
      // Burst the chocolate
      cellEl(nr,nc)?.classList.add('matched');
      board[nr][nc]={v:-1,sp:null};
      score+=60;chocoCleared++;
      scorePop(60);
    }
  }
}

function spreadChocolate(){
  if(!levelLoaded?.spreadEvery||levelLoaded.spreadEvery===0)return;
  if(moveCount%levelLoaded.spreadEvery!==0)return;
  const dirs=[[-1,0],[1,0],[0,-1],[0,1]];
  const chocos=[];
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(board[r][c]?.v===V_CHOCO)chocos.push({r,c});
  shuffle(chocos);
  let spread=0;
  for(const{r,c}of chocos){
    if(spread>=2)break; // max 2 per turn
    const nbrs=dirs.map(([dr,dc])=>({r:r+dr,c:c+dc}))
      .filter(({r:nr,c:nc})=>nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]?.v>=0&&!board[nr][nc]?.locked&&!board[nr][nc]?.cherry&&board[nr][nc]?.jb==null);
    if(!nbrs.length)continue;
    const{r:nr,c:nc}=nbrs[0|Math.random()*nbrs.length];
    board[nr][nc]={v:V_CHOCO,chocolate:true};
    const el=makeCell(nr,nc);placeCell(el,nr,nc,false);
    const choco=el.querySelector('.choco-cell');if(choco)choco.classList.add('choco-new');
    const old=cellEl(nr,nc);
    if(old)old.parentNode.replaceChild(el,old);else document.getElementById('grid').appendChild(el);
    spread++;
    toast('🍫 Chocolate spreads!');
  }
}

function damageJawbreakers(expandedArr){
  const dmgd=new Set();let bonus=0;
  for(const{r,c}of expandedArr){
    for(const[dr,dc]of[[-1,0],[1,0],[0,-1],[0,1]]){
      const nr=r+dr,nc=c+dc;
      if(nr<0||nr>=ROWS||nc<0||nc>=COLS)continue;
      const cell=board[nr][nc];if(!cell||cell.jb==null)continue;
      const k=`${nr},${nc}`;if(dmgd.has(k))continue;dmgd.add(k);
      cell.jb--;
      if(cell.jb<=0){
        const el=cellEl(nr,nc);if(el){el.classList.add('jb-dying');setTimeout(()=>el.remove(),450);}
        board[nr][nc]={v:-1,sp:null};score+=150;bonus+=150;scorePop(150);
      }else{const el=cellEl(nr,nc);if(el){el.classList.add('jb-hit');setTimeout(()=>el.classList.remove('jb-hit'),300);}repCell(nr,nc);}
    }
  }
  if(bonus)toast(`💎 Jawbreaker! +${bonus}`);
}

/* ════════════════════════════════════════════════════
   FISH ANIMATION
════════════════════════════════════════════════════ */
async function animateFishTokens(fishR,fishC,expanded){
  const fishEl=cellEl(fishR,fishC);if(!fishEl)return;
  const fishColor=board[fishR]?.[fishC]?.v;if(fishColor==null)return;
  const targets=expanded.filter(({r,c})=>!(r===fishR&&c===fishC)&&board[r]?.[c]?.v===fishColor).slice(0,5);
  if(!targets.length)return;
  const fr=fishEl.getBoundingClientRect();const fx=fr.left+fr.width/2,fy=fr.top+fr.height/2;
  await Promise.all(targets.map(({r,c},idx)=>new Promise(resolve=>{
    const tel=cellEl(r,c);if(!tel){resolve();return;}
    const tr=tel.getBoundingClientRect();const tx=tr.left+tr.width/2,ty=tr.top+tr.height/2;
    const goLeft=tx<fx;
    const tok=document.createElement('div');tok.className='fish-token';tok.textContent='🐟';
    tok.style.cssText=`left:${fx-14}px;top:${fy-14}px;transform:scaleX(${goLeft?-1:1}) scale(1);opacity:0;transition:none;`;
    document.body.appendChild(tok);
    setTimeout(()=>{
      tok.style.transition='opacity 80ms ease';tok.style.opacity='1';
      setTimeout(()=>{
        const dx=tx-fx,dy=ty-fy;const dur=280+idx*40;
        tok.style.transition=`transform ${dur}ms cubic-bezier(.4,0,.6,1),opacity 80ms ease ${dur-80}ms`;
        tok.style.transform=`scaleX(${goLeft?-1:1}) translate(${goLeft?-Math.abs(dx):dx}px,${dy}px)`;
        setTimeout(()=>tok.style.opacity='0',dur-80);
        setTimeout(()=>{tok.remove();resolve();},dur+40);
      },90);
    },idx*90);
  })));
}

/* ════════════════════════════════════════════════════
   CASCADE LOOP
════════════════════════════════════════════════════ */
async function cascadeLoop(){
  let combo=0;
  while(true){
    const matched=findMatches();
    const squares=find2x2Squares(matched);

    if(!matched.length&&!squares.length)break;
    combo++;

    // ── 2×2 → Fish ──────────────────────────────────
    for(const{r,c,v}of squares){
      const toRemove=[{r,c:c+1},{r:r+1,c},{r:r+1,c:c+1}];
      const allFour=[{r,c},...toRemove];
      collectCherries(allFour);
      await animRemove(allFour);
      allFour.forEach(({r:rr,c:cc})=>{board[rr][cc]={v:-1,sp:null};});
      board[r][c]={v,sp:'fish'};
      const fishEl=makeCell(r,c);placeCell(fishEl,r,c,false);
      document.getElementById('grid').appendChild(fishEl);
      score+=60*combo;toast(`🐟 Fish Candy! +${60*combo}`);scorePop(60*combo);
    }
    if(squares.length){await gravity();await delay(60);updateHUD();continue;}

    // ── Regular matches ──────────────────────────────
    const creates=detectSpecials(matched),expanded=expandSpecials(matched);
    const pts=expanded.length*10*combo;score+=pts;
    if(combo>1)toast(`${['','','💥 Double!','🔥 Triple!','⚡ Mega!','🌟 Ultra!'][combo]||`🎆 x${combo}!`} +${pts}`);
    if(pts>40)scorePop(pts);

    // Collect cherries in matched cells
    collectCherries(expanded);
    // Damage adjacent obstacles
    damageJawbreakers(expanded);
    damageLocks(expanded);
    damageChocolate(expanded);

    // Fish animation
    const fishInMatch=expanded.filter(({r,c})=>board[r]?.[c]?.sp==='fish');
    if(fishInMatch.length)await Promise.all(fishInMatch.map(({r,c})=>animateFishTokens(r,c,expanded)));

    await animRemove(expanded);

    // Clear matched cells
    expanded.forEach(({r,c})=>{
      if(board[r][c]?.v!==-1&&board[r][c]?.jb==null&&board[r][c]?.v!==V_CHOCO)
        board[r][c]={v:-1,sp:null};
    });
    // Also clear chocolate that was burst by damageChocolate (v already set to -1)

    // Place new specials
    creates.forEach(({r,c,v,sp})=>{
      if(board[r][c].v===-1){
        board[r][c]={v,sp};
        if(!cellEl(r,c)){const el=makeCell(r,c);placeCell(el,r,c,false);document.getElementById('grid').appendChild(el);}
      }
    });

    await gravity();await delay(60);
    updateHUD();checkGoalComplete();
  }
}

/* ════════════════════════════════════════════════════
   ANIMATE REMOVE
════════════════════════════════════════════════════ */
async function animRemove(cells){
  return new Promise(resolve=>{
    cells.forEach(({r,c})=>cellEl(r,c)?.classList.add('matched'));
    setTimeout(()=>{cells.forEach(({r,c})=>cellEl(r,c)?.remove());resolve();},360);
  });
}

/* ════════════════════════════════════════════════════
   FLUID GRAVITY
════════════════════════════════════════════════════ */
function gravity(){
  return new Promise(resolve=>{
    const s=csz(),g=GAP;
    const gridEl=document.getElementById('grid');
    let maxDelay=0;

    for(let c=0;c<COLS;c++){
      let writeRow=ROWS-1;
      for(let r=ROWS-1;r>=0;r--){
        if(board[r][c]?.v===-1)continue;
        const el=cellEl(r,c);
        if(writeRow!==r){
          board[writeRow][c]=board[r][c];board[r][c]={v:-1,sp:null};
          if(el){
            el.dataset.r=writeRow;
            el.style.transition=`top 280ms cubic-bezier(0.4,0,0.2,1)`;
            el.style.top=(writeRow*(s+g))+'px';
            maxDelay=Math.max(maxDelay,280);
          }else{
            const ne=makeCell(writeRow,c);ne.style.left=(c*(s+g))+'px';ne.style.top=(writeRow*(s+g))+'px';ne.style.transition='none';gridEl.appendChild(ne);
          }
        }else if(!el){
          const ne=makeCell(r,c);ne.style.left=(c*(s+g))+'px';ne.style.top=(r*(s+g))+'px';ne.style.transition='none';gridEl.appendChild(ne);
        }
        writeRow--;
      }

      // Fill from top with new random candy (or jawbreakers rarely)
      const newCount=writeRow+1;
      for(let r=writeRow;r>=0;r--){
        board[r][c]=rc();
        const el=makeCell(r,c);
        const targetTop=r*(s+g);
        const startTop=-(newCount)*(s+g);
        el.style.left=(c*(s+g))+'px';el.style.top=startTop+'px';el.style.transition='none';
        gridEl.appendChild(el);
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          el.style.transition=`top 320ms cubic-bezier(0.34,1.3,0.64,1)`;
          el.style.top=targetTop+'px';maxDelay=Math.max(maxDelay,320);
        }));
      }
    }

    // Collect ingredients that reached the bottom row
    setTimeout(()=>{
      for(let c=0;c<COLS;c++){
        if(board[ROWS-1][c]?.v===V_INGR){
          const el=cellEl(ROWS-1,c);
          if(el){
            el.style.transition=`top 220ms ease-in, opacity 180ms ease-in 40ms`;
            el.style.top=(ROWS*(s+g))+'px';el.style.opacity='0';
            setTimeout(()=>el.remove(),280);
          }
          board[ROWS-1][c]={v:-1,sp:null};
          goalProgress.ingredients++;score+=100;
          scorePop(100);toast(`🍓 Ingredient dropped! +100`);
          // Fill the now-empty cell
          setTimeout(()=>{
            if(board[ROWS-1][c].v===-1){
              board[ROWS-1][c]=rc();
              const ne=makeCell(ROWS-1,c);placeCell(ne,ROWS-1,c,false);
              gridEl.appendChild(ne);
            }
          },290);
        }
      }
      resolve();
    }, maxDelay+30);
  });
}

/* ════════════════════════════════════════════════════
   HINT
════════════════════════════════════════════════════ */
function findHint(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(!isMatchable(board[r][c]))continue;
    for(const[nr,nc]of[[r,c+1],[r+1,c]]){
      if(nr>=ROWS||nc>=COLS||!isMatchable(board[nr][nc]))continue;
      swapB(r,c,nr,nc);const hit=findMatches().length>0||find2x2Squares().length>0;swapB(r,c,nr,nc);
      if(hit)return{r1:r,c1:c,r2:nr,c2:nc};
    }
  }
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    if(board[r][c]?.sp==='colorbomb'){
      for(const[nr,nc]of[[r,c+1],[r,c-1],[r+1,c],[r-1,c]]){
        if(nr>=0&&nr<ROWS&&nc>=0&&nc<COLS&&board[nr][nc]?.v>=0)return{r1:r,c1:c,r2:nr,c2:nc};
      }
    }
  }
  return null;
}
function doHint(){
  if(busy||!gameActive)return;clearHintHL();
  const h=findHint();if(!h){toast('🔍 No valid moves!');return;}
  const e1=cellEl(h.r1,h.c1),e2=cellEl(h.r2,h.c2);
  if(e1){e1.classList.add('hint-a');hintEls.push(e1);}
  if(e2){e2.classList.add('hint-b');hintEls.push(e2);}
  setTimeout(clearHintHL,2600);
}
function clearHintHL(){hintEls.forEach(el=>el.classList.remove('hint-a','hint-b'));hintEls=[];}

/* ════════════════════════════════════════════════════
   FEEDBACK
════════════════════════════════════════════════════ */
function toast(msg){
  const t=document.getElementById('comboToast');t.textContent=msg;
  t.classList.remove('show');void t.offsetWidth;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),950);
}
function scorePop(pts){
  const el=document.createElement('div');el.className='score-pop';
  el.textContent=`+${pts}`;el.style.left=`${35+Math.random()*28}%`;el.style.top=`${25+Math.random()*42}%`;
  document.body.appendChild(el);setTimeout(()=>el.remove(),1100);
}
function delay(ms){return new Promise(r=>setTimeout(r,ms));}
